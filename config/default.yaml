# RL-Resource-Optimizer Configuration
# =====================================

environment:
  num_nodes: 5
  node_capacity_cpu: 100.0       # Max CPU units per node
  node_capacity_memory: 64.0     # Max memory (GB) per node
  max_queue_size: 20             # Max pending tasks in queue
  max_steps: 500                 # Steps per episode

  # Task arrival distribution
  task_arrival:
    rate: 0.7                    # Probability of new task each step
    cpu_range: [5, 40]           # CPU demand range for tasks
    memory_range: [1, 16]        # Memory demand range for tasks
    duration_range: [3, 20]      # Task duration range (steps)

  # Dynamic constraint changes
  dynamics:
    node_failure_prob: 0.005     # Probability of a node failing each step
    node_recovery_prob: 0.02     # Probability of a failed node recovering
    capacity_fluctuation: 0.05   # Max fraction of capacity change per step

reward:
  throughput_weight: 0.4
  latency_weight: 0.35
  fairness_weight: 0.25
  rejection_penalty: -2.0        # Penalty for dropping tasks
  completion_bonus: 1.0          # Bonus per completed task

dqn:
  learning_rate: 0.001
  gamma: 0.99
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_decay: 0.995
  batch_size: 64
  buffer_size: 50000
  target_update_freq: 10         # Episodes between target network updates
  hidden_dims: [128, 128]
  num_episodes: 500

ppo:
  learning_rate: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  entropy_coef: 0.01
  value_loss_coef: 0.5
  max_grad_norm: 0.5
  update_epochs: 4
  mini_batch_size: 64
  rollout_length: 2048
  hidden_dims: [128, 128]
  num_episodes: 500

evaluation:
  num_eval_episodes: 50
  seed: 42
